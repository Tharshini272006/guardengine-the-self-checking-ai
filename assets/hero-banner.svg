<svg width="1400" height="620" viewBox="0 0 1400 620" xmlns="http://www.w3.org/2000/svg">
  <title>GuardEngine — autonomous runtime guardrails for research-paper RAG</title>
  <desc>Full hero panel on a continuous blue-to-green gradient: shield mark, wordmark, tagline, tech badges, and the verification pipeline strip.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#0E1430"/>
    </linearGradient>
    <radialGradient id="washBlue" cx="12%" cy="2%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washTeal" cx="60%" cy="46%" r="45%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washGreen" cx="90%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- base + full-panel gradient wash, blue top-left fading to green bottom-right -->
  <rect width="1400" height="620" fill="url(#bgGrad)"/>
  <rect width="1400" height="620" fill="url(#washBlue)"/>
  <rect width="1400" height="620" fill="url(#washTeal)"/>
  <rect width="1400" height="620" fill="url(#washGreen)"/>

  <!-- faint frame -->
  <g stroke="#1A2140" stroke-width="1" opacity="0.5">
    <line x1="0" y1="36" x2="1400" y2="36"/>
    <line x1="0" y1="584" x2="1400" y2="584"/>
  </g>

  <!-- shield mark -->
  <g transform="translate(700,150)">
    <path d="M 0 -58 L 48 -38 L 48 10 C 48 46 24 66 0 75 C -24 66 -48 46 -48 10 L -48 -38 Z"
          fill="#10162C" stroke="#3B82F6" stroke-width="2.2"/>
    <path d="M -20 2 L -4 18 L 24 -18" fill="none" stroke="#3B82F6" stroke-width="4.4"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark + tagline, centered -->
  <text x="700" y="252" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="54" font-weight="600" fill="#F4F6FB">GuardEngine</text>
  <text x="700" y="286" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="400" fill="#A9B2D6">Autonomous runtime guardrails for research-paper RAG</text>

  <!-- mock tech badge row (visual language matching shields.io; live badges follow in markdown) -->
  <g font-family="Inter,Arial,sans-serif" font-size="12.5" font-weight="500">
    <g transform="translate(316,322)">
      <rect width="92" height="26" rx="13" fill="#10162C" stroke="#2B3358"/>
      <circle cx="18" cy="13" r="5" fill="#3776AB"/>
      <text x="34" y="17" fill="#C7CCE3">Python 3.11</text>
    </g>
    <g transform="translate(418,322)">
      <rect width="86" height="26" rx="13" fill="#10162C" stroke="#2B3358"/>
      <circle cx="16" cy="13" r="5" fill="#009688"/>
      <text x="30" y="17" fill="#C7CCE3">FastAPI</text>
    </g>
    <g transform="translate(514,322)">
      <rect width="74" height="26" rx="13" fill="#10162C" stroke="#2B3358"/>
      <circle cx="16" cy="13" r="5" fill="#61DAFB"/>
      <text x="30" y="17" fill="#C7CCE3">React</text>
    </g>
    <g transform="translate(598,322)">
      <rect width="100" height="26" rx="13" fill="#10162C" stroke="#2B3358"/>
      <circle cx="16" cy="13" r="5" fill="#6E56CF"/>
      <text x="30" y="17" fill="#C7CCE3">LangGraph</text>
    </g>
    <g transform="translate(708,322)">
      <rect width="96" height="26" rx="13" fill="#10162C" stroke="#2B3358"/>
      <circle cx="16" cy="13" r="5" fill="#3ECF8E"/>
      <text x="30" y="17" fill="#C7CCE3">Supabase</text>
    </g>
    <g transform="translate(814,322)">
      <rect width="76" height="26" rx="13" fill="#10162C" stroke="#2B3358"/>
      <circle cx="16" cy="13" r="5" fill="#9CA3C4"/>
      <text x="30" y="17" fill="#C7CCE3">MIT</text>
    </g>
  </g>

  <!-- divider -->
  <line x1="500" y1="372" x2="900" y2="372" stroke="#1E2640" stroke-width="1"/>

  <!-- italic quote line -->
  <text x="700" y="412" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-style="italic" font-size="15" fill="#8B93B8">
    "The only production RAG system that verifies before it speaks —
  </text>
  <text x="700" y="434" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-style="italic" font-size="15" fill="#8B93B8">
    with real auth, a real product, and a real audit trail."
  </text>

  <!-- pipeline strip -->
  <g transform="translate(700,500)" font-family="Inter,Arial,sans-serif">
    <g transform="translate(-360,0)">
      <rect x="0" y="-16" width="92" height="32" rx="16" fill="#151A2D" stroke="#1E2640"/>
      <text x="46" y="5" text-anchor="middle" font-size="13" fill="#9CA3C4">validate</text>
    </g>
    <line x1="-264" y1="0" x2="-214" y2="0" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow)"/>

    <g transform="translate(-208,0)">
      <rect x="0" y="-16" width="92" height="32" rx="16" fill="#151A2D" stroke="#1E2640"/>
      <text x="46" y="5" text-anchor="middle" font-size="13" fill="#9CA3C4">retrieve</text>
    </g>
    <line x1="-112" y1="0" x2="-62" y2="0" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow)"/>

    <g transform="translate(-56,0)">
      <rect x="0" y="-16" width="92" height="32" rx="16" fill="#151A2D" stroke="#1E2640"/>
      <text x="46" y="5" text-anchor="middle" font-size="13" fill="#9CA3C4">generate</text>
    </g>
    <line x1="40" y1="0" x2="90" y2="0" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow)"/>

    <g transform="translate(96,0)">
      <rect x="0" y="-16" width="92" height="32" rx="16" fill="#1A1530" stroke="#3B2A5E"/>
      <text x="46" y="5" text-anchor="middle" font-size="13" fill="#C4B5FD">judge</text>
    </g>
    <line x1="194" y1="0" x2="244" y2="0" stroke="#A78BFA" stroke-width="1.5" marker-end="url(#arrow)"/>

    <g transform="translate(250,0)">
      <rect x="0" y="-16" width="110" height="32" rx="16" fill="#0F2419" stroke="#1E4D2E"/>
      <text x="55" y="5" text-anchor="middle" font-size="13" fill="#86EFAC">verified ✓</text>
    </g>
  </g>

</svg>
