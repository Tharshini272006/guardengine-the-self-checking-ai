<svg width="1400" height="320" viewBox="0 0 1400 320" xmlns="http://www.w3.org/2000/svg">
  <title>GuardEngine — autonomous runtime guardrails for research-paper RAG</title>
  <desc>Static hero banner showing the GuardEngine shield mark, product name, and the verification pipeline: validate, retrieve, generate, judge, route.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#0E1430"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1400" height="320" fill="url(#bgGrad)"/>

  <!-- faint grid texture -->
  <g stroke="#1A2140" stroke-width="1" opacity="0.5">
    <line x1="0" y1="40" x2="1400" y2="40"/>
    <line x1="0" y1="280" x2="1400" y2="280"/>
  </g>

  <!-- shield mark -->
  <g transform="translate(120,160)">
    <path d="M 0 -52 L 44 -34 L 44 10 C 44 42 22 60 0 68 C -22 60 -44 42 -44 10 L -44 -34 Z"
          fill="#151A2D" stroke="#3B82F6" stroke-width="2"/>
    <path d="M -18 2 L -4 16 L 22 -16" fill="none" stroke="#3B82F6" stroke-width="4"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="200" y="148" font-family="Inter,Arial,sans-serif" font-size="52" font-weight="600" fill="#F4F6FB">GuardEngine</text>
  <text x="200" y="184" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="400" fill="#9CA3C4">Autonomous runtime guardrails for research-paper RAG</text>

  <!-- pipeline strip -->
  <g transform="translate(200,236)" font-family="Inter,Arial,sans-serif">
    <g>
      <rect x="0" y="-16" width="92" height="32" rx="16" fill="#151A2D" stroke="#1E2640"/>
      <text x="46" y="5" text-anchor="middle" font-size="13" fill="#9CA3C4">validate</text>
    </g>
    <line x1="98" y1="0" x2="148" y2="0" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow)"/>

    <g transform="translate(154,0)">
      <rect x="0" y="-16" width="92" height="32" rx="16" fill="#151A2D" stroke="#1E2640"/>
      <text x="46" y="5" text-anchor="middle" font-size="13" fill="#9CA3C4">retrieve</text>
    </g>
    <line x1="252" y1="0" x2="302" y2="0" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow)"/>

    <g transform="translate(308,0)">
      <rect x="0" y="-16" width="92" height="32" rx="16" fill="#151A2D" stroke="#1E2640"/>
      <text x="46" y="5" text-anchor="middle" font-size="13" fill="#9CA3C4">generate</text>
    </g>
    <line x1="406" y1="0" x2="456" y2="0" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow)"/>

    <g transform="translate(462,0)">
      <rect x="0" y="-16" width="92" height="32" rx="16" fill="#1A1530" stroke="#3B2A5E"/>
      <text x="46" y="5" text-anchor="middle" font-size="13" fill="#C4B5FD">judge</text>
    </g>
    <line x1="560" y1="0" x2="610" y2="0" stroke="#A78BFA" stroke-width="1.5" marker-end="url(#arrow)"/>

    <g transform="translate(616,0)">
      <rect x="0" y="-16" width="100" height="32" rx="16" fill="#0F2419" stroke="#1E4D2E"/>
      <text x="50" y="5" text-anchor="middle" font-size="13" fill="#86EFAC">verified ✓</text>
    </g>
  </g>
</svg>
