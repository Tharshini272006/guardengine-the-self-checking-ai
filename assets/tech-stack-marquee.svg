<svg width="1400" height="160" viewBox="0 0 1400 160" xmlns="http://www.w3.org/2000/svg">
  <title>GuardEngine tech stack — tools moving along the verification pipeline</title>
  <desc>Animated marquee showing React, FastAPI, LangGraph, Groq, ChromaDB, Supabase and PyMuPDF icons traveling along a horizontal pipeline line, looping continuously.</desc>

  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0B1020" stop-opacity="1"/>
      <stop offset="6%" stop-color="#0B1020" stop-opacity="0"/>
      <stop offset="94%" stop-color="#0B1020" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0B1020" stop-opacity="1"/>
    </linearGradient>

    <clipPath id="clip">
      <rect x="0" y="0" width="1400" height="160"/>
    </clipPath>

    <!-- pulse dot moving along the line, used multiple times -->
    <circle id="pulseDot" r="3" fill="#3B82F6"/>
  </defs>

  <rect width="1400" height="160" fill="#0B1020"/>

  <g clip-path="url(#clip)">

    <!-- the pipeline line itself -->
    <line x1="0" y1="80" x2="1400" y2="80" stroke="#1E2640" stroke-width="2"/>
    <line x1="0" y1="80" x2="1400" y2="80" stroke="#3B82F6" stroke-width="1" stroke-dasharray="6 10" opacity="0.5">
      <animate attributeName="stroke-dashoffset" from="0" to="-32" dur="1.6s" repeatCount="indefinite"/>
    </line>

    <!-- traveling pulse along the line -->
    <circle r="3.5" fill="#3B82F6">
      <animateMotion dur="6s" repeatCount="indefinite" path="M -40 80 L 1440 80"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.9;1" dur="6s" repeatCount="indefinite"/>
    </circle>

    <!-- GROUP 1 (scrolls right-to-left, loops) -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; -1400 0" dur="28s" repeatCount="indefinite"/>

      <!-- React -->
      <g transform="translate(60,80)">
        <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
        <g stroke="#3B82F6" stroke-width="1.2" fill="none">
          <ellipse rx="13" ry="5"/>
          <ellipse rx="13" ry="5" transform="rotate(60)"/>
          <ellipse rx="13" ry="5" transform="rotate(120)"/>
        </g>
        <circle r="2.6" fill="#3B82F6"/>
        <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">React</text>
      </g>

      <!-- FastAPI -->
      <g transform="translate(220,80)">
        <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
        <path d="M 2 -16 L -12 4 L -1 4 L -4 16 L 13 -6 L 2 -6 Z" fill="#22C55E" transform="scale(0.85)"/>
        <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">FastAPI</text>
      </g>

      <!-- LangGraph -->
      <g transform="translate(380,80)">
        <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
        <g stroke="#A78BFA" stroke-width="1.4" fill="none">
          <circle r="3.5" cx="-12" cy="-8" fill="#A78BFA" stroke="none"/>
          <circle r="3.5" cx="12" cy="-8" fill="#A78BFA" stroke="none"/>
          <circle r="3.5" cx="0" cy="10" fill="#A78BFA" stroke="none"/>
          <line x1="-12" y1="-8" x2="0" y2="10"/>
          <line x1="12" y1="-8" x2="0" y2="10"/>
          <line x1="-12" y1="-8" x2="12" y2="-8"/>
        </g>
        <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">LangGraph</text>
      </g>

      <!-- Groq -->
      <g transform="translate(540,80)">
        <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
        <path d="M -10 -14 L 10 -14 L 10 -2 L 2 -2 L 2 14 L -6 14 L -6 -2 L -10 -2 Z" fill="#F97316"/>
        <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">Groq</text>
      </g>

      <!-- ChromaDB -->
      <g transform="translate(700,80)">
        <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
        <g fill="none" stroke="#EC4899" stroke-width="1.4">
          <ellipse rx="13" ry="6" cy="-8"/>
          <path d="M -13 -8 L -13 8 A 13 6 0 0 0 13 8 L 13 -8"/>
          <line x1="-13" y1="0" x2="13" y2="0" opacity="0.6"/>
        </g>
        <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">ChromaDB</text>
      </g>

      <!-- Supabase -->
      <g transform="translate(860,80)">
        <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
        <path d="M 2 -16 L -10 3 L -1 3 L -3 16 L 10 -4 L 1 -4 Z" fill="#22C55E" opacity="0.9"/>
        <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">Supabase</text>
      </g>

      <!-- PyMuPDF -->
      <g transform="translate(1020,80)">
        <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
        <g fill="none" stroke="#60A5FA" stroke-width="1.3">
          <rect x="-9" y="-14" width="18" height="24" rx="2"/>
          <line x1="-5" y1="-7" x2="5" y2="-7"/>
          <line x1="-5" y1="-2" x2="5" y2="-2"/>
          <line x1="-5" y1="3" x2="2" y2="3"/>
        </g>
        <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">PyMuPDF</text>
      </g>

      <!-- Vite -->
      <g transform="translate(1180,80)">
        <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
        <path d="M -13 -15 L 13 -15 L 1 15 L -2 15 Z" fill="none" stroke="#3B82F6" stroke-width="1.4"/>
        <path d="M -2 -2 L 6 -2 L -1 9" fill="none" stroke="#A78BFA" stroke-width="1.2"/>
        <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">Vite</text>
      </g>

      <!-- repeat block shifted +1400 so the loop is seamless -->
      <g transform="translate(1400,0)">
        <g transform="translate(60,80)">
          <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
          <g stroke="#3B82F6" stroke-width="1.2" fill="none">
            <ellipse rx="13" ry="5"/>
            <ellipse rx="13" ry="5" transform="rotate(60)"/>
            <ellipse rx="13" ry="5" transform="rotate(120)"/>
          </g>
          <circle r="2.6" fill="#3B82F6"/>
          <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">React</text>
        </g>
        <g transform="translate(220,80)">
          <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
          <path d="M 2 -16 L -12 4 L -1 4 L -4 16 L 13 -6 L 2 -6 Z" fill="#22C55E" transform="scale(0.85)"/>
          <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">FastAPI</text>
        </g>
        <g transform="translate(380,80)">
          <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
          <g stroke="#A78BFA" stroke-width="1.4" fill="none">
            <circle r="3.5" cx="-12" cy="-8" fill="#A78BFA" stroke="none"/>
            <circle r="3.5" cx="12" cy="-8" fill="#A78BFA" stroke="none"/>
            <circle r="3.5" cx="0" cy="10" fill="#A78BFA" stroke="none"/>
            <line x1="-12" y1="-8" x2="0" y2="10"/>
            <line x1="12" y1="-8" x2="0" y2="10"/>
            <line x1="-12" y1="-8" x2="12" y2="-8"/>
          </g>
          <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">LangGraph</text>
        </g>
        <g transform="translate(540,80)">
          <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
          <path d="M -10 -14 L 10 -14 L 10 -2 L 2 -2 L 2 14 L -6 14 L -6 -2 L -10 -2 Z" fill="#F97316"/>
          <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">Groq</text>
        </g>
        <g transform="translate(700,80)">
          <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
          <g fill="none" stroke="#EC4899" stroke-width="1.4">
            <ellipse rx="13" ry="6" cy="-8"/>
            <path d="M -13 -8 L -13 8 A 13 6 0 0 0 13 8 L 13 -8"/>
            <line x1="-13" y1="0" x2="13" y2="0" opacity="0.6"/>
          </g>
          <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">ChromaDB</text>
        </g>
        <g transform="translate(860,80)">
          <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
          <path d="M 2 -16 L -10 3 L -1 3 L -3 16 L 10 -4 L 1 -4 Z" fill="#22C55E" opacity="0.9"/>
          <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">Supabase</text>
        </g>
        <g transform="translate(1020,80)">
          <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
          <g fill="none" stroke="#60A5FA" stroke-width="1.3">
            <rect x="-9" y="-14" width="18" height="24" rx="2"/>
            <line x1="-5" y1="-7" x2="5" y2="-7"/>
            <line x1="-5" y1="-2" x2="5" y2="-2"/>
            <line x1="-5" y1="3" x2="2" y2="3"/>
          </g>
          <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">PyMuPDF</text>
        </g>
        <g transform="translate(1180,80)">
          <circle r="26" fill="#151A2D" stroke="#1E2640" stroke-width="1"/>
          <path d="M -13 -15 L 13 -15 L 1 15 L -2 15 Z" fill="none" stroke="#3B82F6" stroke-width="1.4"/>
          <path d="M -2 -2 L 6 -2 L -1 9" fill="none" stroke="#A78BFA" stroke-width="1.2"/>
          <text x="0" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" fill="#9CA3C4">Vite</text>
        </g>
      </g>
    </g>
  </g>

  <!-- edge fade so icons appear/disappear smoothly rather than popping -->
  <rect width="1400" height="160" fill="url(#fade)"/>
</svg>
